<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arabic Practice</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Naskh+Arabic&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #58cc02, #46a302);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      width: 420px;
      max-width: 90%;
      text-align: center;
    }

    .card {
      animation: pop 0.3s ease;
    }
    
    @keyframes pop {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    h1 {
      margin-bottom: 20px;
      font-weight: 800;
      color: white;
    }

    #question {
      font-size: 22px;
      font-weight: 600;
      margin: 20px 0;
      color: #333;
    }

    #answer {
      font-size: 30px;
      margin: 25px 0;
      color: #58cc02;
      font-family: 'Noto Naskh Arabic', serif;
    }

    .label {
      font-size: 13px;
      color: #999;
      margin-bottom: 10px;
    }

    .buttons {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      padding: 14px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: 0.15s;
    }

    .generate {
      background: #58cc02;
      color: white;
      box-shadow: 0 4px 0 #3a8f02;
    }

    .generate:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #3a8f02;
    }

    .answer {
      background: #e5e5e5;
      color: #333;
    }

    .answer:hover {
      background: #d6d6d6;
    }

    .answer-box {
      background: #f7f7f7;
      border-radius: 12px;
      padding: 15px;
      margin-top: 15px;
    }

  </style>
</head>

<body>

  <div class="app">
    <h1>Arabic Practice</h1>

    <div class="card">

      <div id="question">Click Generate</div>

      <div class="answer-box" id="answer" style="display:none;"></div>

      <div id="label" class="label"></div>

      <div class="buttons">
        <button class="generate" onclick="generate()">Generate</button>
        <button class="answer" onclick="showAnswer()">Show Answer</button>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
