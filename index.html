<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arabic Practice</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Naskh+Arabic&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    
    .app {
      width: 100%;
      max-width: 600px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 25px;
      font-weight: 800;
      color: #22c55e; /* soft green */
    }

    .card {
      background: #1e293b;
      padding: 30px 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      animation: pop 0.3s ease;
      min-height: 44px;
      margin-top: 10px;
    }

    @keyframes pop {
      from { transform: scale(0.96); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    #question {
      font-size: 20px;
      line-height: 1.4;
      font-weight: 600;
      margin: 20px 0 12px;
      color: #e2e8f0;
      white-space: normal;
    }

    @media (max-width: 480px) {
      #question {
        font-size: 18px;
      }
    
      #answer {
        font-size: 26px;
      }
    
      button {
        font-size: 15px;
        padding: 12px;
      }
    
      .card {
        padding: 20px 16px;
      }
    }

    @media (min-height: 700px) {
      body {
        align-items: center;
        min-height: 100vh;
      }
    }

    #answer {
      font-size: 32px;
      margin: 25px 0;
      color: #22c55e;
      font-family: 'Noto Naskh Arabic', serif;
    }

    .answer-box {
      background: #0f172a;
      border-radius: 12px;
      padding: 15px;
      margin-top: 20px;
      border: 1px solid #334155;
    }

    .label {
      display: inline-block;
      padding: 4px 10px;
      font-size: 12px;
      color: #ffffff;
      background: #334155;
      border-radius: 999px;
      margin-top: 8px;
      margin-bottom: 15px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .buttons {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      position: relative;
      overflow: hidden;
      padding: 14px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
      min-height: 44px;
    }

    /* GENERATE BUTTON */
    .generate {
      background: #22c55e;
      color: #022c22;
      box-shadow: 0 4px 0 #15803d;
    }

    .generate:hover {
      background: #16a34a;
    }

    .generate:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #15803d;
    }

    /* ANSWER BUTTON */
    .answer {
      background: #334155;
      color: #e2e8f0;
    }

    .answer:hover {
      background: #475569;
    }

    .answer:active {
      transform: scale(0.97);
    }

    /* RIPPLE EFFECT */
    button::after {
      content: "";
      position: absolute;
      width: 100px;
      height: 100px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      transform: scale(0);
      opacity: 0;
      pointer-events: none;
    }

    button:active::after {
      transform: scale(2.5);
      opacity: 1;
      transition: transform 0.4s, opacity 0.6s;
    }

  </style>
</head>

<body>

  <div class="app">
    <h1>Arabic Practice</h1>

    <div class="card">

      <div id="question">Click Generate</div>

      <div class="answer-box" id="answer" style="display:none;"></div>

      <div id="label" class="label"></div>

      <div class="buttons">
        <button class="generate" onclick="generateSentence()">Generate</button>
        <button class="answer" onclick="showAnswer()">Show Answer</button>
        <button onclick="toggleMode()" id="modeBtn" class="answer">Mode: Verb</button>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
